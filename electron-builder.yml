appId: com.gittree.app
productName: GitTree
directories:
  output: dist
  buildResources: build
files:
  - out/**
  - package.json
win:
  target:
    - nsis
    - portable
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  artifactName: ${productName}-${version}-setup.${ext}
portable:
  artifactName: ${productName}-${version}-portable.${ext}
